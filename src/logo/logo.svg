<svg viewBox="0 0 128 128" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0d9488"/>
      <stop offset="1" stop-color="#134e4a"/>
    </linearGradient>
    <linearGradient id="folderTab" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ccfbf1"/>
      <stop offset="1" stop-color="#99f6e4"/>
    </linearGradient>
    <linearGradient id="folderFront" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#ffffff"/>
      <stop offset="1" stop-color="#ecfeff"/>
    </linearGradient>
    <filter id="shadow" x="-20%" y="-20%" width="140%" height="140%">
      <feDropShadow dx="0" dy="2" stdDeviation="2" flood-opacity="0.2"/>
    </filter>
  </defs>

  <!-- Rounded background (non-Microsoft teal gradient) -->
  <rect width="128" height="128" rx="24" fill="url(#bg)"/>

  <g filter="url(#shadow)">
    <!-- Folder tab/back -->
    <path fill="url(#folderTab)"
          d="M 22 34
             L 52 34
             L 60 44
             L 102 44
             a 6 6 0 0 1 6 6
             L 108 96
             a 6 6 0 0 1 -6 6
             L 22 102
             a 6 6 0 0 1 -6 -6
             L 16 40
             a 6 6 0 0 1 6 -6
             Z"/>

    <!-- Folder front -->
    <path fill="url(#folderFront)"
          d="M 16 54
             L 108 54
             L 108 96
             a 6 6 0 0 1 -6 6
             L 22 102
             a 6 6 0 0 1 -6 -6
             Z"/>
  </g>

  <!-- Cloud inside the folder (teal, echoes background) -->
  <path fill="#0d9488"
        d="M 44 76
           C 48 72 54 70 58 72
           C 62 66 72 66 76 72
           C 82 70 88 76 86 82
           C 90 84 90 90 86 92
           L 42 92
           C 36 92 36 82 42 82
           Z"/>
</svg>
